<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Runner — 개인정보처리방침 / Privacy Policy</title>
  <script>
    // Redirect to the language-specific page based on the browser language.
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      var dest = lang.indexOf('ko') === 0 ? 'ko/' : 'en/';
      location.replace(dest);
    })();
  </script>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b1020; color: #e8ebf5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                   "Malgun Gothic", Roboto, sans-serif;
    }
    .box { text-align: center; padding: 24px; }
    h1 { font-size: 1.4rem; margin: 0 0 16px; }
    a {
      display: inline-block; margin: 6px; padding: 10px 22px; border-radius: 999px;
      color: #fff; text-decoration: none;
      background: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 100%);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Virtual Runner — 개인정보처리방침 / Privacy Policy</h1>
    <p>언어를 선택하세요 / Choose a language</p>
    <a href="ko/">한국어</a>
    <a href="en/">English</a>
  </div>
</body>
</html>
